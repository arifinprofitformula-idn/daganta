name: daganta

services:
  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_STOREFRONT_ROOT_DOMAIN: ${NEXT_PUBLIC_STOREFRONT_ROOT_DOMAIN}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    env_file:
      - .env.production
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health/ready').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  migrate:
    profiles:
      - release
    build:
      context: .
      target: migrator
    env_file:
      - .env.production
    restart: "no"
    security_opt:
      - no-new-privileges:true
